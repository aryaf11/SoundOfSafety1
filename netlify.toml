# Netlify: واجهة preview + دوال حقيقية للفحص

[build]
  publish = "preview"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/check-url"
  to = "/.netlify/functions/check-url"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# تطوير محلي: لا نستخدم المنفذ الداخلي الافتراضي 3999 لتفادي EADDRINUSE.
# Netlify يوجّه إلى خادم ثابت خارجي على targetPort.
[dev]
  command = "npx --yes serve@14 preview --listen 7599 --no-clipboard"
  port = 8890
  targetPort = 7599
  publish = "preview"
