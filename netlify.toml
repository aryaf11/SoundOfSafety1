# Netlify: واجهة preview + دوال حقيقية للفحص

[build]
  publish = "preview"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/check-url"
  to = "/.netlify/functions/check-url"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
