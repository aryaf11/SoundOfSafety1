name: SoundOfSafety
options:
  bundleIdPrefix: com.soundofsafety
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0.0"
targets:
  SoundOfSafety:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: SoundOfSafety
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soundofsafety.app
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_ENTITLEMENTS: SoundOfSafety/SoundOfSafety.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Sound of Safety
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    entitlements:
      path: SoundOfSafety/SoundOfSafety.entitlements
    dependencies:
      - target: SoundOfSafetyShareExtension
        embed: true
  SoundOfSafetyShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Shared
      - path: SoundOfSafetyShareExtension
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soundofsafety.app.shareextension
        INFOPLIST_FILE: SoundOfSafetyShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: SoundOfSafetyShareExtension/SoundOfSafetyShareExtension.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
